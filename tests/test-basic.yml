name: Test basic Qodana scan invocation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal qodana.yaml for scan
        run: |
          cat > "$GITHUB_WORKSPACE/qodana.yaml" <<'EOF'
          version: "1.0"
          linter: jetbrains/qodana-jvm-community:2026.1
          EOF

      - id: action
        uses: .
        with:
          use-caches: "false"
          upload-result: "false"
          use-annotations: "false"
          pr-mode: "false"
          post-pr-comment: "false"
          push-fixes: "none"
          results-dir: "/tmp/qodana-results"
          cache-dir: "/tmp/qodana-caches"
        continue-on-error: true

      - name: Assert action ran (step completed)
        run: |
          echo "Action step completed (exit may be non-zero if Qodana finds issues or CLI unavailable)"
          echo "PASS: action was invoked without setup error"
