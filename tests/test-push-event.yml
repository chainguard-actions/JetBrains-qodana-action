name: Test Qodana scan on push event
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
      GITHUB_SHA: abc1234567890abcdef1234567890abcdef12345
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          use-caches: "false"
          upload-result: "false"
          use-annotations: "false"
          pr-mode: "false"
          post-pr-comment: "false"
          push-fixes: "none"
          results-dir: "/tmp/qodana-results-push"
          cache-dir: "/tmp/qodana-caches-push"
          artifact-name: "qodana-push-report"
        continue-on-error: true

      - name: Assert action step completed
        run: |
          echo "Push event scenario: action invoked successfully"
          echo "PASS"
